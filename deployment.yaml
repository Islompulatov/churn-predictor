apiVersion: apps/v1
kind: Deployment

metadata:
  name: churn-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: churn-app

  template:
    metadata:
      labels:
        app: churn-app

    spec:
      containers:
        - name: fastapi-app
          image: 288757602829.dkr.ecr.us-west-2.amazonaws.com/devops-repo:latest
          ports:
            - containerPort: 8000